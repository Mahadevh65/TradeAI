server:
  port: 8083

spring:
  application:
    name: trademind-ai

  datasource:
    # Supabase PostgreSQL connection string.
    # prepareThreshold=0 disables server-side prepared statements — required
    # when connecting through Supabase's PgBouncer pooler (port 6543, transaction
    # mode), which does not support them and throws "prepared statement already exists".
    # url: ${DB_URL:jdbc:postgresql://aws-0-ap-northeast-1.pooler.supabase.com:6543/postgres?user=postgres.aptwfhvjqisyyrtkhywb&password=MahadevHulsure}
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Also disable Hikari/pgjdbc's statement cache — belt and suspenders
      # alongside prepareThreshold=0 above.
      prepareThreshold: 0
      data-source-properties:
        preparedStatementCacheQueries: 0
        preparedStatementCacheSizeMiB: 0

  jpa:
    hibernate:
      ddl-auto: validate   # schema is managed via schema.sql / migrations, not auto-generated
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:CHANGE_THIS_TO_A_LONG_RANDOM_BASE64_SECRET_MIN_256_BITS}
    access-token-expiration-ms: 900000        # 15 minutes
    refresh-token-expiration-ms: 604800000    # 7 days
    issuer: trademind-ai
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
  providers:
    twelve-data:
      api-key: ${TWELVE_DATA_API_KEY:}
      base-url: https://api.twelvedata.com
    finnhub:
      api-key: ${FINNHUB_API_KEY:}
      base-url: https://finnhub.io/api/v1
    news-api:
      api-key: ${NEWS_API_KEY:}
      base-url: https://newsapi.org/v2
    ai:
      # Any OpenAI-compatible /chat/completions endpoint. Leave api-key blank to
      # run the AI Copilot in "not configured" mode (it degrades gracefully).
      api-key: ${AI_API_KEY:}
      base-url: ${AI_BASE_URL:https://api.groq.com/openai/v1}
      model: ${AI_MODEL:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.trademind: INFO
    org.springframework.security: WARN
